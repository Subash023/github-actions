name: multi-job

on: 
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Runs job 1
              run: echo "This is job 1"
    
    job2:
        runs-on: ubuntu-latest
        needs: job1
        steps:
            - name: Checkout code
              uses: actions/checkout@v7
            - name: Runs job 2
              run: echo "This is job 2"

    job3:
        runs-on: ubuntu-latest
        needs: job2
        if: success()
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Runs job 2
              run: echo "This is job 2"

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version: 3.14

            - name: Verify python version
              run: |
                python --version
                echo "Repository: ${{ vars.REPOSITORY }}"
                echo "SECRET: ${{ secrets.MY_SECRET }}"